exclude = [
    "**/__pycache__",
    "**/tests/**",
    "build",
    "dist",
    ".venv",
    "docs",
]

source_roots = ["src"]
exact = true
forbid_circular_dependencies = true
ignore_type_checking_imports = true

# ── Module Boundaries ───────────────────────────────────────────────
#
# Key constraint: nft.py is the auditable security boundary.
# It may only import from nft_constants (literals-only, no logic).
# All other modules may import freely within the package.

# Security boundary — literals only, no dependencies
[[modules]]
path = "terok_shield.nft_constants"
depends_on = []

# Security boundary — only stdlib + nft_constants
[[modules]]
path = "terok_shield.nft"
depends_on = [
    "terok_shield.nft_constants",
]

# Shared utilities — standalone, no internal deps
[[modules]]
path = "terok_shield.util"
depends_on = []

# Shared validators — standalone, no internal deps
[[modules]]
path = "terok_shield.validation"
depends_on = []

# Subprocess helpers — standalone, no internal deps
[[modules]]
path = "terok_shield.run"
depends_on = []

# Configuration — depends on nft_constants for network defaults
[[modules]]
path = "terok_shield.config"
depends_on = [
    "terok_shield.nft_constants",
]

# Audit logging — depends on config + validation
[[modules]]
path = "terok_shield.audit"
depends_on = [
    "terok_shield.config",
    "terok_shield.validation",
]

# DNS resolution and caching — depends on config + run + util + validation
[[modules]]
path = "terok_shield.dns"
depends_on = [
    "terok_shield.config",
    "terok_shield.run",
    "terok_shield.util",
    "terok_shield.validation",
]

# Profile loading — depends on config + validation
[[modules]]
path = "terok_shield.profiles"
depends_on = [
    "terok_shield.config",
    "terok_shield.validation",
]

# OCI hook entry point — depends on audit, config, nft, run, validation
[[modules]]
path = "terok_shield.oci_hook"
depends_on = [
    "terok_shield.audit",
    "terok_shield.config",
    "terok_shield.nft",
    "terok_shield.run",
    "terok_shield.validation",
]

# Hook mode — OCI hooks, per-container netns
[[modules]]
path = "terok_shield.mode_hook"
depends_on = [
    "terok_shield.config",
    "terok_shield.dns",
    "terok_shield.nft",
    "terok_shield.profiles",
    "terok_shield.run",
    "terok_shield.util",
    "terok_shield.validation",
]

# CLI — depends on package root (public API)
[[modules]]
path = "terok_shield.cli"
depends_on = [
    "terok_shield",
]

# Package root — public API, dispatches to mode modules
[[modules]]
path = "terok_shield"
depends_on = [
    "terok_shield.audit",
    "terok_shield.config",
    "terok_shield.dns",
    "terok_shield.mode_hook",
    "terok_shield.nft",
    "terok_shield.profiles",
    "terok_shield.run",
    "terok_shield.util",
]
