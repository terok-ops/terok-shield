exclude = [
    "**/__pycache__",
    "**/tests/**",
    "build",
    "dist",
    ".venv",
    "docs",
]

source_roots = ["src"]
exact = true
forbid_circular_dependencies = true
ignore_type_checking_imports = true

# ── Module Boundaries ───────────────────────────────────────────────
#
# Key constraint: nft.py is the auditable security boundary.
# It may only import from nft_constants (literals-only, no logic).
# All other modules may import freely within the package.

# Security boundary — literals only, no dependencies
[[modules]]
path = "terok_shield.nft_constants"
depends_on = []

# Security boundary — only stdlib + nft_constants
[[modules]]
path = "terok_shield.nft"
depends_on = [
    "terok_shield.nft_constants",
]

# Per-container state bundle layout — zero dependencies
[[modules]]
path = "terok_shield.state"
depends_on = []

# Podman environment detection — standalone, no internal deps
[[modules]]
path = "terok_shield.podman_info"
depends_on = []

# Shared utilities — standalone, no internal deps
[[modules]]
path = "terok_shield.util"
depends_on = []

# Shared validators — standalone, no internal deps
[[modules]]
path = "terok_shield.validation"
depends_on = []

# Subprocess helpers — standalone, no internal deps
[[modules]]
path = "terok_shield.run"
depends_on = []

# Configuration — pure data definitions, no dependencies
[[modules]]
path = "terok_shield.config"
depends_on = []

# Audit logging — no internal deps (takes explicit path)
[[modules]]
path = "terok_shield.audit"
depends_on = []

# DNS resolution and caching — depends on run + util
[[modules]]
path = "terok_shield.dns"
depends_on = [
    "terok_shield.run",
    "terok_shield.util",
]

# Profile loading — depends on validation
[[modules]]
path = "terok_shield.profiles"
depends_on = [
    "terok_shield.validation",
]

# OCI hook entry point — depends on audit, config, nft, run, state
[[modules]]
path = "terok_shield.oci_hook"
depends_on = [
    "terok_shield.audit",
    "terok_shield.config",
    "terok_shield.nft",
    "terok_shield.podman_info",
    "terok_shield.run",
    "terok_shield.state",
]

# Hook mode — OCI hooks, per-container netns
[[modules]]
path = "terok_shield.mode_hook"
depends_on = [
    "terok_shield.config",
    "terok_shield.nft",
    "terok_shield.podman_info",
    "terok_shield.run",
    "terok_shield.state",
    "terok_shield.util",
]

# Command registry — depends on package root for type hints only
[[modules]]
path = "terok_shield.registry"
depends_on = []

# CLI — depends on package root (public API) + audit for logs scanning + validation + registry + run
[[modules]]
path = "terok_shield.cli"
depends_on = [
    "terok_shield",
    "terok_shield.audit",
    "terok_shield.mode_hook",
    "terok_shield.podman_info",
    "terok_shield.registry",
    "terok_shield.run",
    "terok_shield.validation",
]

# Package root — public API, dispatches to mode modules
[[modules]]
path = "terok_shield"
depends_on = [
    "terok_shield.audit",
    "terok_shield.config",
    "terok_shield.dns",
    "terok_shield.mode_hook",
    "terok_shield.nft",
    "terok_shield.podman_info",
    "terok_shield.profiles",
    "terok_shield.registry",
    "terok_shield.run",
    "terok_shield.state",
    "terok_shield.util",
]
