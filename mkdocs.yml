site_name: terok-shield
site_description: nftables-based egress firewalling for Podman containers
site_url: https://terok-ai.github.io/terok-shield
repo_url: https://github.com/terok-ai/terok-shield
repo_name: terok-ai/terok-shield

theme:
  name: material
  font:
    text: Ubuntu
    code: Ubuntu Mono
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: black
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            show_root_full_path: false
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            members_order: source
            merge_init_into_class: true
  - terok:
      ci_map: true
      ci_map_path: ci_map.md
      quality_report: true
      quality_report_path: quality_report.md
      quality_report_codecov_repo: terok-ai/terok-shield
      quality_report_codecov_treemap_path: docs/assets/coverage_treemap.svg
      test_map: true
      test_map_path: test_map.md
      ref_pages: true
      ref_pages_path: reference
  - literate-nav:
      nav_file: SUMMARY.md
  - section-index

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - User Guide:
    - guide/index.md
    - Getting Started: guide/getting_started.md
    - Allowlist Profiles: guide/profiles.md
    - Firewall Modes: guide/modes.md
    - CLI Reference: guide/cli.md
    - Configuration: guide/configuration.md
    - Audit Logging: guide/logging.md
  - Developer Guide:
    - Security & Design: security.md
    - Architecture: design.md
    - Contributing: developer.md
    - Code Quality: quality_report.md
    - CI Workflow Map: ci_map.md
    - Integration Test Map: test_map.md
  - API Reference: reference/

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/terok-ai/terok-shield

extra_css:
  - https://fonts.googleapis.com/css2?family=Ubuntu:wght@400;500;700&family=Ubuntu+Mono:wght@400;700&display=swap
