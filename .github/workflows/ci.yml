name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  reuse:
    if: github.repository == 'terok-ops/terok-shield'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: REUSE compliance check
        uses: fsfe/reuse-action@v6

  lint:
    if: github.repository == 'terok-ops/terok-shield'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Ruff lint
        uses: astral-sh/ruff-action@v3
        with:
          args: check

      - name: Ruff format check
        uses: astral-sh/ruff-action@v3
        with:
          args: format --check

  docstring-coverage:
    if: github.repository == 'terok-ops/terok-shield'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install tools
        run: pip install -r .github/requirements-ci.txt

      - name: Check docstring coverage
        run: docstr-coverage src/terok_shield/ --fail-under=95

  dead-code:
    if: github.repository == 'terok-ops/terok-shield'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install tools
        run: pip install -r .github/requirements-ci.txt

      - name: Check for dead code
        run: vulture src/terok_shield/ vulture_whitelist.py --min-confidence 80

  security:
    if: github.repository == 'terok-ops/terok-shield'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install tools
        run: pip install -r .github/requirements-ci.txt

      - name: Run SAST scan
        run: bandit -r src/terok_shield/ -ll

  test:
    if: github.repository == 'terok-ops/terok-shield'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Install dynamic versioning plugin
        run: poetry self add "poetry-dynamic-versioning[plugin]"

      - name: Load cached venv
        id: cached-poetry-dependencies
        uses: actions/cache@v5
        with:
          path: .venv
          key: venv-${{ runner.os }}-test-${{ hashFiles('**/pyproject.toml', '**/poetry.lock') }}

      - name: Install dependencies
        if: steps.cached-poetry-dependencies.outputs.cache-hit != 'true'
        run: poetry install --with test --no-interaction

      - name: Run tests
        run: poetry run pytest --cov=terok_shield --cov-report=xml --cov-report=term-missing

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
