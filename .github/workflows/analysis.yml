# Pin third-party actions to full commit SHAs for supply-chain security.
# GitHub-owned actions (actions/*) may use version tags.
# This workflow groups the fast, source-tree-only checks that feed SonarQube Cloud.
# Host/PODMAN integration coverage stays in other workflows so Sonar does not wait for it.
name: Tests & Analysis

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  # Unit tests are the authoritative producer of reports/coverage.xml.
  # On pull requests they also capture a tiny PR metadata artifact so the
  # privileged workflow_run-based Sonar scan can analyze fork PRs safely.
  unit-tests:
    name: Unit tests
    if: github.repository == 'terok-ai/terok-shield'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        id: setup-python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Poetry
        uses: snok/install-poetry@76e04a911780d5b312d89783f7b1cd627778900a # v1
        with:
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Install dynamic versioning plugin
        run: poetry self add "poetry-dynamic-versioning[plugin]"

      - name: Load cached venv
        id: cached-poetry-dependencies
        uses: actions/cache@v5
        with:
          path: .venv
          key: venv-${{ runner.os }}-py${{ steps.setup-python.outputs.python-version }}-test-${{ hashFiles('**/pyproject.toml', '**/poetry.lock') }}

      - name: Install dependencies
        run: poetry install --with test --no-interaction

      - name: Run unit tests
        run: make test-unit

      - name: Upload coverage for SonarQube Cloud
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: reports/coverage.xml
          retention-days: 1

      - name: Save PR metadata
        if: github.event_name == 'pull_request'
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_BASE: ${{ github.event.pull_request.base.ref }}
          PR_REF: ${{ github.event.pull_request.head.ref }}
          PR_REPO: ${{ github.event.pull_request.head.repo.full_name }}
          PR_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          mkdir -p reports/pr
          printf '%s\n' "$PR_NUMBER" > reports/pr/number
          printf '%s\n' "$PR_BASE" > reports/pr/base
          printf '%s\n' "$PR_REF" > reports/pr/ref
          printf '%s\n' "$PR_REPO" > reports/pr/repo
          printf '%s\n' "$PR_SHA" > reports/pr/sha

      - name: Upload PR metadata
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v7
        with:
          name: pr
          path: reports/pr/
          retention-days: 1

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@1af58845a975a7985b0beb0cbe6fbbb71a41dbad # v5
        with:
          files: ./reports/coverage.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/test-results-action@0fa95f0e1eeaafde2c782583b36b28ad0d8c77d3 # v1
        with:
          files: ./reports/unit.junit.xml
          token: ${{ secrets.CODECOV_TOKEN }}

  # Ruff and Bandit run as separate jobs so they show up as distinct checks in GitHub UI
  # and so Sonar can import their JSON reports without hiding them inside a unit-test job.
  ruff:
    name: Ruff
    if: github.repository == 'terok-ai/terok-shield'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Create reports directory
        run: mkdir -p reports

      - name: Write Ruff report
        uses: astral-sh/ruff-action@4919ec5cf1f49eff0871dbcea0da843445b837e6 # v3
        with:
          args: check --exit-zero --output-format=json --output-file=reports/ruff-report.json .

      - name: Upload Ruff report
        uses: actions/upload-artifact@v7
        with:
          name: ruff
          path: reports/ruff-report.json
          retention-days: 1

  bandit:
    name: Bandit
    if: github.repository == 'terok-ai/terok-shield'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install tools
        run: pip install -r .github/requirements-ci.txt

      - name: Create reports directory
        run: mkdir -p reports

      - name: Write Bandit report
        run: bandit -r src/terok_shield/ --exit-zero -f json -o reports/bandit-report.json

      - name: Upload Bandit report
        uses: actions/upload-artifact@v7
        with:
          name: bandit
          path: reports/bandit-report.json
          retention-days: 1

  # Same-repo pushes and pull requests can scan directly here because the run has access
  # to SONAR_TOKEN. Fork PRs are handled by sonar_pr.yml via workflow_run, using the
  # artifacts uploaded above, because GitHub does not expose secrets to fork PR runs.
  sonar:
    name: SonarQube Cloud
    if: github.repository == 'terok-ai/terok-shield' && (github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository)
    needs: [unit-tests, ruff, bandit]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v8
        with:
          name: coverage
          path: reports

      - uses: actions/download-artifact@v8
        with:
          name: ruff
          path: reports

      - uses: actions/download-artifact@v8
        with:
          name: bandit
          path: reports

      - name: SonarQube Cloud scan
        uses: SonarSource/sonarqube-scan-action@a31c9398be7ace6bbfaf30c0bd5d415f843d45e9 # v7.0.0
        env:
          GITHUB_TOKEN: ${{ github.token }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
