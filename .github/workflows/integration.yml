name: Integration Tests

on:
  workflow_dispatch:

jobs:
  integration:
    if: github.repository == 'terok-ai/terok-shield'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Poetry
        uses: snok/install-poetry@76e04a911780d5b312d89783f7b1cd627778900a # v1
        with:
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Install dynamic versioning plugin
        run: poetry self add "poetry-dynamic-versioning[plugin]"

      - name: Load cached venv
        id: cached-poetry-dependencies
        uses: actions/cache@v5
        with:
          path: .venv
          key: venv-${{ runner.os }}-integration-${{ hashFiles('**/pyproject.toml', '**/poetry.lock') }}

      - name: Install dependencies
        if: steps.cached-poetry-dependencies.outputs.cache-hit != 'true'
        run: poetry install --with test --no-interaction

      - name: Install nftables and Podman
        run: sudo apt-get update && sudo apt-get install -y nftables podman

      - name: Run integration tests
        run: poetry run pytest tests/integration/ -v
